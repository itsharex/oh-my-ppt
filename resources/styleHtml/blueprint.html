<!DOCTYPE html>

<title>蓝图 · blueprint</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}html{display:grid;place-items:center;background:#0f1117}body{display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#dbeafe;background:#0f1117}.slide{position:relative;width:min(100vw,calc(100vh*16/9));aspect-ratio:16/9;overflow:hidden;background:linear-gradient(145deg, #1e3a5f 0%, #1e40af 50%, #1d4ed8 100%);box-shadow:0 0 0 1px rgba(255,255,255,.08);isolation:isolate}.slide:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(248,250,252,.13) 1px,transparent 1px),linear-gradient(0deg,rgba(248,250,252,.13) 1px,transparent 1px);background-size:8.333% 12.5%;opacity:.42;pointer-events:none}.slide:after{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 82% 16%,#93c5fd44,transparent 25%),radial-gradient(circle at 12% 88%,#60a5fa33,transparent 28%);filter:blur(10px);opacity:.72;pointer-events:none}.content{position:absolute;inset:7.5% 7%;z-index:2;display:grid;grid-template-columns:1.08fr .92fr;gap:5%;align-items:stretch}.hero{display:flex;flex-direction:column;justify-content:space-between;min-width:0}.eyebrow{display:flex;align-items:center;gap:2.5%;font-size:clamp(7px,1vw,11px);font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(248,250,252,.74)}.eyebrow:before{content:"";width:12%;height:3px;background:#93c5fd;box-shadow:none}h1{margin:0;font-size:clamp(28px,5.55vw,64px);line-height:.95;font-weight:900;letter-spacing:0;color:#dbeafe;text-wrap:balance;text-shadow:0 0 20px #93c5fd55}.desc{margin:4% 0 0;max-width:88%;font-size:clamp(10px,1.42vw,16px);line-height:1.68;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:rgba(248,250,252,.74)}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:5%}.tags span{border:1px solid rgba(255,255,255,.22);background:rgba(2,6,23,.52);backdrop-filter:blur(10px);border-radius:2px;padding:5px 9px;font-size:clamp(7px,.9vw,10px);font-weight:700;color:#dbeafe}.story{display:grid;grid-template-columns:1fr 1fr;gap:3%;margin-top:5%}.story p{margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;border-left:3px solid #93c5fd;padding-left:8px;font-size:clamp(8px,1vw,11px);line-height:1.45;color:rgba(248,250,252,.74)}.panel{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.22);border-radius:2px;background:rgba(2,6,23,.52);box-shadow:6px 6px 0 rgba(255,255,255,.28);backdrop-filter:blur(14px);padding:7%;display:grid;grid-template-rows:auto 1fr auto;gap:5%}.panel:before{content:"";position:absolute;inset:0;border-top:5px solid #93c5fd;opacity:.95}.visual{position:relative;min-height:0;border:1px solid rgba(255,255,255,.22);border-radius:2px;overflow:hidden;background:rgba(0,0,0,.18)}.kicker{font-size:clamp(8px,1vw,11px);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#93c5fd}.layout{font-size:clamp(9px,1.1vw,13px);line-height:1.58;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;color:rgba(248,250,252,.74);position:relative;z-index:2}.palette{display:flex;gap:6px}.palette i{display:block;width:clamp(14px,2vw,22px);height:clamp(14px,2vw,22px);border-radius:0;background:var(--c);border:1px solid rgba(255,255,255,.22);box-shadow:none}.footer span:first-child{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.footer{position:absolute;left:7%;right:7%;bottom:4.8%;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:4%;font-size:clamp(7px,.9vw,10px);font-weight:800;color:rgba(248,250,252,.74);letter-spacing:.08em;text-transform:uppercase}.footer b{color:#dbeafe}.terminal{position:absolute;inset:10%;padding:8%;border:1px solid #93c5fd88;background:rgba(0,0,0,.38);color:#93c5fd;font-family:"SFMono-Regular","Consolas",monospace}.dots b{display:inline-block;width:8px;height:8px;border-radius:50%;background:#93c5fd;margin-right:6px}.terminal pre{font-size:clamp(8px,1.05vw,13px);line-height:1.8;white-space:pre-wrap}.terminal span{color:#dbeafe}.metric{position:absolute;left:8%;top:9%;display:flex;flex-direction:column}.metric strong{font-size:clamp(32px,5vw,58px);line-height:1;color:#dbeafe}.metric span{font-size:clamp(7px,.9vw,10px);font-weight:800;color:rgba(248,250,252,.74);text-transform:uppercase}.bars{position:absolute;left:8%;right:8%;bottom:14%;height:42%;display:flex;align-items:flex-end;gap:7%}.bars i{flex:1;background:linear-gradient(180deg,var(--c),#93c5fd);border-radius:0}.axis{position:absolute;left:8%;right:8%;bottom:12%;height:1px;background:rgba(255,255,255,.22)}.mast{position:absolute;left:8%;top:9%;font-family:Georgia,serif;font-size:clamp(13px,2vw,22px);font-weight:900;color:#93c5fd}.quote{position:absolute;left:8%;right:8%;top:32%;font-family:Georgia,"Songti SC",serif;font-size:clamp(14px,2.25vw,26px);line-height:1.2;color:#dbeafe}.rule{position:absolute;left:8%;right:8%;bottom:18%;height:4px;background:#93c5fd}.columns{position:absolute;left:8%;right:8%;bottom:8%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5%}.columns i{height:22px;background:linear-gradient(0deg,rgba(248,250,252,.13),transparent);border-top:1px solid rgba(255,255,255,.22)}.geo{position:absolute;border:3px solid rgba(255,255,255,.55)}.g1{width:34%;aspect-ratio:1;left:9%;top:12%;border-radius:50%;background:#93c5fd}.g2{width:36%;height:24%;right:8%;top:18%;background:#60a5fa;transform:rotate(-8deg)}.g3{width:0;height:0;left:18%;bottom:12%;border-left:38px solid transparent;border-right:38px solid transparent;border-bottom:64px solid #1e3a5f;border-top:0}.g4{width:42%;height:10%;right:11%;bottom:18%;background:#dbeafe;transform:rotate(5deg)}.soft-shape{position:absolute;border-radius:48% 52% 46% 54%;filter:blur(.2px);opacity:.72}.s1{width:46%;height:48%;left:5%;top:10%;background:#93c5fd55}.s2{width:36%;height:34%;right:8%;bottom:9%;background:#60a5fa66}.soft-note{position:absolute;left:11%;right:11%;top:37%;font-family:Georgia,"Songti SC",serif;font-size:clamp(14px,2.1vw,25px);line-height:1.35;color:#dbeafe;text-align:center}.orb{position:absolute;border-radius:999px;filter:blur(10px);opacity:.75}.o1{width:54%;height:54%;left:-8%;top:-8%;background:#93c5fd77}.o2{width:44%;height:44%;right:-6%;bottom:-8%;background:#60a5fa77}.shine{position:absolute;inset:-35%;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.34) 48%,transparent 60%);transform:rotate(8deg)}.glass-line{position:absolute;left:12%;right:12%;top:50%;height:2px;background:#dbeafe;opacity:.45}.chips{display:flex;flex-wrap:wrap;gap:7px}.chips span{font-size:clamp(7px,.9vw,10px);color:rgba(248,250,252,.74);border-bottom:1px solid rgba(255,255,255,.22);padding-bottom:2px}@media(max-aspect-ratio:16/9){.slide{width:min(100vw,calc(100vh*16/9));height:auto}}@media(min-aspect-ratio:16/9){.slide{height:min(100vh,calc(100vw*9/16));width:auto}}
</style>
</head>
<body>
  <main class="slide" aria-label="蓝图 style preview">
    <section class="content">
      <div class="hero">
        <div>
          <div class="eyebrow">效果 · 重 · blueprint</div>
          <h1>蓝图</h1>
          <p class="desc">深蓝底上浅蓝线条织就网格，建筑师的梦想画布</p>
          <div class="tags"><span>系统架构展示</span><span>工程蓝图讲解</span><span>技术方案设计</span><span>基础设施规划</span></div>
          <div class="story"><p>标题 #dbeafe 浅蓝白、正文 #93c5fd 中蓝，强调色 #60a5fa 亮蓝与 #3b82f6 蓝色是蓝图上的线条色。</p><p>等宽或技术感字体，白色或浅蓝色文字在深蓝底上清晰可读。</p></div>
        </div>
        <div class="chips"><span>path-draw</span><span>fade-up</span><span>stagger-list</span></div>
      </div>
      <aside class="panel">
        <div>
          <div class="kicker">Style DNA</div>
          <div class="layout">蓝图是建筑师的梦想画布——深蓝的底色上，浅蓝色的线条织就精密的网格。</div>
        </div>
        <div class="visual"><div class="geo g1"></div><div class="geo g2"></div><div class="geo g3"></div><div class="geo g4"></div></div>
        <div class="palette"><i style="--c:#dbeafe"></i><i style="--c:#93c5fd"></i><i style="--c:#60a5fa"></i><i style="--c:#3b82f6"></i><i style="--c:#1e3a5f"></i></div>
      </aside>
    </section>
    <div class="footer"><span><b>Layout</b> 网格底纹贯穿每一页，节点和连线构成视觉的主要结构。</span><span>16:9 preview</span></div>
  </main>
</body>
</html>
