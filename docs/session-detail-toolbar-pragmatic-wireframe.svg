<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="1600" height="980">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', SimHei, sans-serif;
      fill: #111827;
    }
    .title { font-size: 25px; font-weight: 800; }
    .h2 { font-size: 23px; font-weight: 800; }
    .label { font-size: 15px; font-weight: 700; }
    .small { font-size: 13px; fill: #374151; }
    .muted { font-size: 12px; fill: #6b7280; }
    .frame { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .titlebar { fill: #f5f1e8; stroke: #d8d2c5; stroke-width: 1.5; }
    .toolbarBtn { fill: #fffaf1; stroke: #d9cfbd; stroke-width: 1.5; }
    .blueArea { fill: #f5f1e8; stroke: #d9cfbd; stroke-width: 1.5; }
    .tabRail { fill: #fffaf1; stroke: #d9cfbd; stroke-width: 1.5; }
    .tab { fill: #d4e4c1; stroke: #b7c9a5; stroke-width: 1.5; }
    .dynamic { fill: #efe5d6; stroke: #d9cfbd; stroke-width: 1.5; }
    .sidebar { fill: #f6f2e9; stroke: #d8d2c5; stroke-width: 1.5; }
    .panel { fill: #f8f4ec; stroke: #d9cfbd; stroke-width: 1.5; }
    .dash { fill: none; stroke: #9ca3af; stroke-width: 1.4; stroke-dasharray: 6 6; }
    .call { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
    .callGreen { fill: none; stroke: #16a34a; stroke-width: 2.2; marker-end: url(#arrow-green); }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#ffffff" />
  <text x="54" y="48" class="title">session-detail 保守版工具区线框</text>
  <text x="54" y="74" class="muted">第一阶段建议：SessionToolbar 仍在顶部；页面工作区使用上下两层 ribbon，右侧动态面板作为扩展槽。</text>

  <rect x="52" y="104" width="1496" height="820" rx="14" class="frame" />

  <!-- Existing session toolbar kept -->
  <rect x="104" y="142" width="1410" height="70" rx="8" class="titlebar" />
  <circle cx="132" cy="177" r="8" fill="#f87171" />
  <circle cx="160" cy="177" r="8" fill="#fbbf24" />
  <circle cx="188" cy="177" r="8" fill="#34d399" />
  <g transform="translate(514 158)">
    <rect width="110" height="38" rx="8" class="toolbarBtn" />
    <text x="28" y="24" class="small">版本历史</text>
    <rect x="122" width="110" height="38" rx="8" class="toolbarBtn" />
    <text x="150" y="24" class="small">保存模板</text>
    <rect x="244" width="136" height="38" rx="8" class="toolbarBtn" />
    <text x="274" y="24" class="small">导出 PPTX ▾</text>
    <rect x="392" width="128" height="38" rx="8" class="toolbarBtn" />
    <text x="424" y="24" class="small">打包导出 ▾</text>
    <rect x="532" width="152" height="38" rx="8" class="toolbarBtn" />
    <text x="562" y="24" class="small">导出图片/PDF ▾</text>
    <rect x="696" width="124" height="38" rx="8" class="toolbarBtn" />
    <text x="724" y="24" class="small">浏览器预览</text>
    <rect x="832" width="116" height="38" rx="8" class="toolbarBtn" />
    <text x="862" y="24" class="small">演示模式</text>
    <rect x="960" width="112" height="38" rx="8" class="toolbarBtn" />
    <text x="990" y="24" class="small">查看文件</text>
  </g>

  <!-- New top work area -->
  <rect x="96" y="246" width="1420" height="316" class="blueArea" />
  <rect x="116" y="264" width="440" height="64" rx="24" class="tabRail" />
  <rect x="132" y="274" width="48" height="44" rx="8" fill="#eef2e8" stroke="#c7d2b4" stroke-width="1.5" />
  <text x="148" y="302" class="label">⌂</text>
  <text x="214" y="304" class="h2">保存 / 撤销 / 重做</text>

  <rect x="606" y="264" width="950" height="64" rx="24" class="tabRail" />
  <rect x="636" y="264" width="112" height="64" class="tab" />
  <text x="660" y="304" class="h2">预览</text>
  <rect x="772" y="264" width="112" height="64" class="tab" />
  <text x="796" y="304" class="h2">编辑</text>
  <rect x="908" y="264" width="112" height="64" class="tab" />
  <text x="932" y="304" class="h2">插入</text>
  <rect x="1044" y="264" width="112" height="64" class="tab" />
  <text x="1068" y="304" class="h2">动画</text>
  <rect x="1180" y="264" width="136" height="64" class="tab" />
  <text x="1202" y="304" class="h2">演讲稿</text>
  <rect x="1340" y="264" width="128" height="64" class="tab" />
  <text x="1368" y="304" class="h2">AI 模式</text>

  <rect x="108" y="344" width="1404" height="112" class="dynamic" />
  <text x="724" y="409" class="h2">动态工具区（按需出现）</text>
  <text x="438" y="438" class="small">预览不显示这一行；插入等有二级工具的 tab 才显示添加文本、图片、视频等工具</text>

  <!-- Workspace -->
  <rect x="96" y="574" width="270" height="348" rx="8" class="sidebar" />
  <rect x="116" y="596" width="226" height="38" rx="17" fill="#ebe6d8" stroke="#d8d2c5" />
  <rect x="120" y="600" width="110" height="30" rx="14" fill="#ffffff" stroke="#e5e7eb" />
  <text x="162" y="620" class="small">页面</text>
  <text x="270" y="620" class="small">大纲</text>
  <rect x="122" y="650" width="220" height="112" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="2" />
  <text x="134" y="786" class="small">P1  2026AI动漫的发展与未来</text>
  <rect x="122" y="806" width="220" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" />
  <text x="154" y="882" class="small">+ 新增页面</text>

  <rect x="396" y="574" width="824" height="348" class="panel" />
  <text x="770" y="760" class="h2">预览</text>
  <text x="650" y="804" class="small">PreviewStage 继续作为主区域</text>

  <rect x="1252" y="574" width="300" height="348" class="panel" />
  <text x="1310" y="760" class="h2">动态出来的面板</text>
  <text x="1288" y="798" class="small">编辑：属性检查器</text>
  <text x="1288" y="822" class="small">AI：聊天/指令面板</text>
  <text x="1288" y="846" class="small">插入：素材库/上传</text>

  <path d="M 104 232 L 1514 232" class="dash" />
  <path d="M 384 574 L 384 922" class="dash" />
  <path d="M 1236 574 L 1236 922" class="dash" />

  <path d="M 680 226 C 770 212, 840 224, 918 256" class="call" />
  <text x="704" y="226" class="small" fill="#2563eb">保留现有 SessionToolbar，迁移风险小</text>
  <path d="M 1044 326 C 1028 350, 958 360, 850 370" class="callGreen" />
  <text x="1018" y="342" class="small" fill="#16a34a">预览和编辑分开，动态工具区按 tab 切换</text>
  <path d="M 1376 574 C 1376 524, 1260 492, 1120 456" class="call" />
  <text x="1184" y="508" class="small" fill="#2563eb">右侧面板先做成按模式切换</text>
</svg>
